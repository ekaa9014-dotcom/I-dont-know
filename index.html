<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETIADAAN: THE TULPA PROJECT 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="initAudio()">
    <div id="game-container">
        <div id="background"></div>
        <div id="glitch-overlay"></div>

        <div id="main-menu">
            <h1 class="glitch" data-text="KETIADAAN">KETIADAAN</h1>
            <p>Fragmen Memori SMA Akasaka</p>
            <div class="menu-options">
                <div class="choice-btn" onclick="startGame()">MASUK KE MEMORI</div>
                <div class="choice-btn" onclick="toggleAlbum()">ALBUM ENDING</div>
            </div>
        </div>

        <div id="game-ui" style="display:none;">
            <div id="stat-overlay">
                <div>KESADARAN: <span id="stat-sanity">100</span>%</div>
                <div>TRAUMA: <span id="stat-trauma">0</span></div>
                <div>IKATAN: <span id="stat-attachment">0</span></div>
            </div>
            <div id="bag-button" onclick="toggleInventory()">🎒 TAS</div>
        </div>

        <div id="album-overlay" class="overlay"><div class="overlay-content"><h3>ALBUM TRAUMA</h3><div id="album-list"></div><button class="close-btn" onclick="toggleAlbum()">TUTUP</button></div></div>
        <div id="inventory-overlay" class="overlay"><div class="overlay-content"><h3>INVENTORY</h3><div id="item-list"></div><button class="close-btn" onclick="toggleInventory()">TUTUP</button></div></div>

        <div id="character-container"><img id="character" src="yuna.png" alt="Yuna"></div>

        <div id="dialog-box" style="display:none;">
            <h2 id="name" class="glitch">SISTEM</h2>
            <div id="text-container"><p id="text"></p></div>
            <div id="choices"></div>
        </div>
    </div>

    <audio id="bgm" loop></audio>
    <audio id="sfx"></audio>

    <script src="script.js"></script>
</body>
</html>
